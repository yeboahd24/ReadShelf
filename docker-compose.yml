services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: readshelf
      POSTGRES_PASSWORD: readshelf
      POSTGRES_DB: readshelf
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U readshelf"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "${PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://readshelf:readshelf@db:5432/readshelf?sslmode=disable
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
